<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - SIGNAL LOST - anoikis.info</title>
<meta name="robots" content="noindex,follow" />
<link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
<style>
  :root {
    --bg:        #020606;
    --panel:     rgba(8, 14, 14, 0.85);
    --border:    rgba(54, 204, 204, 0.35);
    --text:      #e8efff;
    --dim:       #6a7575;
    --highlight: #e8d44d;
    --accent:    #36cccc;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
    min-height: 100vh;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 48px 56px 42px;
    max-width: 640px;
    width: 100%;
    text-align: center;
    position: relative;
  }
  /* Big faded 404 in the background of the card — visible but not loud. */
  .code {
    position: absolute;
    top: 10px; right: 18px;
    font-size: 76px;
    font-weight: 700;
    color: var(--highlight);
    opacity: 0.12;
    letter-spacing: 5px;
    pointer-events: none;
    line-height: 1;
  }
  .heading {
    color: var(--highlight);
    font-size: 17px;
    letter-spacing: 4px;
    font-weight: 700;
    margin: 0 0 24px;
  }
  .body {
    color: var(--accent);
    font-size: 16px;
    line-height: 1.7;
    margin: 0 0 32px;
  }
  .body .dim {
    color: var(--accent);
    opacity: 0.7;
    font-size: 14px;
    display: block;
    margin-top: 8px;
  }
  .btn {
    display: inline-block;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 12px 24px;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 1.5px;
    transition: color 0.12s, border-color 0.12s, background 0.12s;
    background: transparent;
  }
  .btn:hover {
    color: var(--highlight);
    border-color: var(--highlight);
    background: rgba(232, 212, 77, 0.06);
  }
  /* Bottom-right small status code stamp — extra touch of "this is a system
     response" rather than a friendly app screen. */
  .stamp {
    position: fixed;
    bottom: 14px;
    right: 18px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--dim);
  }
  @media (max-width: 480px) {
    .card { padding: 34px 26px 30px; }
    .code { font-size: 56px; top: 8px; right: 12px; }
    .heading { font-size: 14px; letter-spacing: 3px; }
    .body { font-size: 14px; }
    .body .dim { font-size: 12px; }
    .btn { font-size: 13px; padding: 11px 22px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="code" aria-hidden="true">404</div>
    <h1 class="heading">// SIGNAL LOST //</h1>
    <p class="body">
      SYSTEM NOT FOUND IN ANOIKIS REGISTRY.
      <span class="dim">Either you mistyped, or this signature collapsed.</span>
    </p>
    <a class="btn" href="https://anoikis.info/">return to anoikis.info</a>
  </div>
  <div class="stamp">ERROR 404</div>
</body>
</html>
