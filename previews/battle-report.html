<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Battle Report — mockup</title>
<style>
  :root {
    --bg:          #000;
    --panel:       rgba(2, 6, 6, 0.76);
    --panel-dark:  rgba(1, 3, 3, 0.88);
    --border:      #0f2e2e;
    --border-hi:   rgba(0, 200, 200, 0.38);
    --text:        #8de0e0;
    --muted:       #4fc8c8;
    --dim:         #3d8888;
    --accent:      #00c8c8;
    --highlight:   #e8d44d;
    --danger:      #fe3743;
    --warn:        #e8d44d;
    --side-a:      #6ad0c7;
    --side-b:      #e89a4d;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: radial-gradient(ellipse at 50% 30%, #011616 0%, #000 70%);
    color: var(--text);
    font: 13px/1.45 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    min-height: 100vh;
  }

  .wrap {
    max-width: 1480px;
    margin: 24px auto;
    padding: 0 16px 60px;
  }

  /* Two-column split: analysis on the left, system killfeed on the right.
     The killfeed mirrors the live killfeed UX (newest-first list, render
     image + ship/pilot/corp). On narrow viewports the columns collapse to
     a single column and a tabs control switches between them. */
  .br-split {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 16px;
    align-items: start;
  }
  .br-left  { min-width: 0; }
  .br-right {
    position: sticky;
    top: 24px;
    max-height: calc(100vh - 48px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--border-hi);
  }

  /* Mobile/tablet tabs (hidden on wide screens) */
  .br-tabs {
    display: none;
    margin-bottom: 14px;
    gap: 8px;
  }
  .br-tab {
    flex: 1;
    background: var(--panel-dark);
    border: 1px solid var(--border-hi);
    color: var(--muted);
    padding: 8px 12px;
    font: inherit;
    cursor: pointer;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 11px;
  }
  .br-tab.active {
    background: rgba(0, 200, 200, 0.12);
    color: var(--text);
    border-color: var(--accent);
  }

  /* Right column — system killfeed (style mirrors live killfeed) */
  .br-feed-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .br-feed-header b {
    color: var(--muted);
    font-weight: 700;
  }
  .br-feed-list {
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }
  .br-feed-list::-webkit-scrollbar { width: 6px; }
  .br-feed-list::-webkit-scrollbar-track { background: transparent; }
  .br-feed-list::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

  .br-feed-row {
    position: relative;
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    align-items: center;
  }
  .br-feed-row:last-child { border-bottom: none; }
  .br-feed-row:hover { background: rgba(0, 200, 200, 0.04); }

  /* Side-color stripe on the left edge of each row */
  .br-feed-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--dim);
  }
  .br-feed-row.side-a::before { background: var(--side-a); }
  .br-feed-row.side-b::before { background: var(--side-b); }

  .br-feed-img {
    width: 56px;
    height: 56px;
    background-color: rgba(0, 0, 0, 0.4);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .br-feed-info {
    min-width: 0;
    overflow: hidden;
  }
  .br-feed-info-ship {
    color: var(--text);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .br-feed-info-pilot {
    color: var(--muted);
    font-size: 11px;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .br-feed-info-corp {
    color: var(--dim);
    font-size: 10px;
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .br-feed-meta {
    text-align: right;
    white-space: nowrap;
  }
  .br-feed-isk {
    color: var(--highlight);
    font-weight: 600;
    font-size: 12px;
  }
  .br-feed-time {
    color: var(--dim);
    font-size: 10px;
    margin-top: 4px;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .toolbar input,
  .toolbar select,
  .toolbar button {
    background: var(--panel-dark);
    border: 1px solid var(--border-hi);
    color: var(--text);
    padding: 6px 10px;
    font: inherit;
    border-radius: 2px;
  }
  .toolbar button { cursor: pointer; }
  .toolbar button:hover { background: rgba(0, 200, 200, 0.12); }
  .toolbar .lbl { color: var(--dim); align-self: center; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }

  /* Header card */
  .br-header {
    background: var(--panel);
    border: 1px solid var(--border-hi);
    padding: 14px 18px;
    margin-bottom: 12px;
    backdrop-filter: blur(6px);
  }
  .br-title {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .br-sys {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
  }
  .br-class {
    color: var(--muted);
    font-size: 14px;
  }
  .br-type {
    margin-left: auto;
    color: var(--highlight);
    font-size: 11px;
    letter-spacing: 2px;
    font-weight: 700;
    border: 1px solid var(--highlight);
    padding: 3px 8px;
    border-radius: 2px;
  }
  .br-type.eviction { color: var(--danger); border-color: var(--danger); }
  .br-type.gank     { color: var(--dim);    border-color: var(--dim); }
  .br-meta {
    display: flex;
    gap: 18px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .br-meta b { color: var(--text); font-weight: 600; }

  /* Timeline (cumulative ISK line chart) */
  .br-timeline {
    background: var(--panel-dark);
    border: 1px solid var(--border);
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .br-timeline-label {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .br-timeline-legend {
    display: flex;
    gap: 16px;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: none;
  }
  .br-timeline-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .br-timeline-legend-swatch {
    width: 16px;
    height: 3px;
    display: inline-block;
  }
  .br-timeline-svg {
    width: 100%;
    height: 160px;
    display: block;
  }
  .br-timeline-svg .grid-line { stroke: var(--border); stroke-width: 1; }
  .br-timeline-svg .axis-text { fill: var(--dim); font-size: 10px; font-family: ui-monospace, Menlo, Consolas, monospace; }
  .br-timeline-svg .line-a    { stroke: var(--side-a); stroke-width: 2; fill: none; }
  .br-timeline-svg .line-b    { stroke: var(--side-b); stroke-width: 2; fill: none; }
  .br-timeline-svg .area-a    { fill: var(--side-a); opacity: 0.18; }
  .br-timeline-svg .area-b    { fill: var(--side-b); opacity: 0.18; }
  .br-timeline-svg .dot       { stroke: var(--bg); stroke-width: 1; }
  .br-timeline-svg .dot-a     { fill: var(--side-a); }
  .br-timeline-svg .dot-b     { fill: var(--side-b); }
  .br-timeline-axis {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    color: var(--dim);
    font-size: 10px;
  }

  /* ISK efficiency meter */
  .br-eff {
    background: var(--panel-dark);
    border: 1px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .br-eff-label {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-align: center;
  }
  .br-eff-bar {
    height: 22px;
    display: flex;
    background: var(--panel);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .br-eff-fill-a {
    background: var(--side-a);
    display: flex;
    align-items: center;
    padding: 0 8px;
    font-weight: 700;
    color: var(--bg);
    font-size: 11px;
    min-width: 0;
  }
  .br-eff-fill-b {
    background: var(--side-b);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 8px;
    font-weight: 700;
    color: var(--bg);
    font-size: 11px;
    min-width: 0;
  }
  .br-eff-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .br-eff-meta .a { color: var(--side-a); }
  .br-eff-meta .b { color: var(--side-b); }

  /* Ship class breakdown bars (inside side cards) */
  .br-class-rows {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 10px;
  }
  .br-class-row {
    display: grid;
    grid-template-columns: 60px 36px 1fr;
    gap: 8px;
    align-items: center;
    font-size: 11px;
  }
  .br-class-row-label {
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 10px;
  }
  .br-class-row-count {
    color: var(--text);
    font-weight: 700;
    font-size: 12px;
    text-align: right;
  }
  .br-class-row-bar-wrap {
    height: 12px;
    background: rgba(0, 0, 0, 0.35);
    position: relative;
    overflow: hidden;
  }
  .br-class-row-bar-bg {
    height: 100%;
    opacity: 0.45;
  }
  .br-class-row-bar-lost {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    background: var(--danger);
    opacity: 0.85;
  }
  .br-side.side-a .br-class-row-bar-bg { background: var(--side-a); }
  .br-side.side-b .br-class-row-bar-bg { background: var(--side-b); }

  /* Fleet strength chart specifics (reuses .br-timeline-svg color scheme) */
  .br-fleet-svg .line-a { stroke: var(--side-a); stroke-width: 2; fill: none; }
  .br-fleet-svg .line-b { stroke: var(--side-b); stroke-width: 2; fill: none; }
  .br-fleet-svg .area-a { fill: var(--side-a); opacity: 0.18; }
  .br-fleet-svg .area-b { fill: var(--side-b); opacity: 0.18; }
  .br-fleet-svg .grid-line { stroke: var(--border); stroke-width: 1; }
  .br-fleet-svg .axis-text { fill: var(--dim); font-size: 10px; font-family: ui-monospace, Menlo, Consolas, monospace; }

  /* ISK comparison mirror bar */
  .br-compare {
    background: var(--panel-dark);
    border: 1px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .br-compare-label {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-align: center;
  }
  .br-compare-row {
    display: grid;
    grid-template-columns: 1fr 4px 1fr;
    gap: 8px;
    align-items: center;
  }
  .br-compare-side {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .br-compare-side.left  { justify-content: flex-end; }
  .br-compare-side.right { justify-content: flex-start; }
  .br-compare-bar-wrap {
    flex: 1;
    height: 14px;
    background: rgba(0, 0, 0, 0.35);
    position: relative;
    overflow: hidden;
  }
  .br-compare-bar {
    height: 100%;
    transition: width 0.3s;
  }
  .br-compare-bar.side-a {
    background: var(--side-a);
    margin-left: auto;
  }
  .br-compare-bar.side-b {
    background: var(--side-b);
  }
  .br-compare-isk {
    font-weight: 700;
    color: var(--text);
    font-size: 14px;
    white-space: nowrap;
  }
  .br-compare-isk.side-a { color: var(--side-a); }
  .br-compare-isk.side-b { color: var(--side-b); }
  .br-compare-divider {
    background: var(--border-hi);
    height: 18px;
    width: 2px;
    margin: 0 auto;
  }

  /* Sides — strict two-column with the ISK efficiency bar serving as the
     vertical divider AND the data viz between them. */
  .br-sides-wrap {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    margin-bottom: 12px;
  }
  .br-side {
    background: var(--panel);
    border: 1px solid var(--border-hi);
    padding: 14px 16px;
  }
  .br-side.side-a {
    border-right: none;
    border-left: 3px solid var(--side-a);
  }
  .br-side.side-b {
    border-left: none;
    border-right: 3px solid var(--side-b);
  }
  .br-side-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .br-side-name.side-a { color: var(--side-a); }
  .br-side-name.side-b { color: var(--side-b); }
  .br-side-stats {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 8px;
  }
  .br-side-stats b { color: var(--text); }

  /* "Carried by" callout inside each side card */
  .br-side-carry {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    margin-bottom: 10px;
    background: var(--panel-dark);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }
  .br-side-carry-star {
    color: var(--highlight);
    font-size: 12px;
  }
  .br-side-carry b { color: var(--text); }

  /* Vertical efficiency divider (between the two side columns) */
  .br-eff-vertical {
    width: 56px;
    background: var(--panel-dark);
    border-top: 1px solid var(--border-hi);
    border-bottom: 1px solid var(--border-hi);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .br-eff-vertical-label {
    position: absolute;
    top: 8px;
    left: 0;
    right: 0;
    text-align: center;
    color: var(--dim);
    font-size: 9px;
    letter-spacing: 1.5px;
  }
  .br-eff-vertical-fill {
    position: absolute;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bg);
    font-weight: 700;
    font-size: 13px;
  }
  .br-eff-vertical-fill.side-a { background: var(--side-a); top: 0; }
  .br-eff-vertical-fill.side-b { background: var(--side-b); bottom: 0; }
  .br-eff-vertical-divider {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--border-hi);
  }

  /* Headline kill — full-width below side cards, visually highlighted */
  .br-headline {
    display: grid;
    grid-template-columns: 88px 1fr auto;
    gap: 14px;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--highlight);
    box-shadow: 0 0 18px rgba(232, 212, 77, 0.12);
    padding: 14px 18px;
    margin-bottom: 12px;
  }
  .br-headline-img {
    width: 88px;
    height: 88px;
    background-color: rgba(0, 0, 0, 0.4);
    background-size: cover;
    background-position: center;
  }
  .br-headline-info-label {
    color: var(--highlight);
    font-size: 9px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .br-headline-info-ship {
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .br-headline-info-meta {
    color: var(--muted);
    font-size: 11px;
  }
  .br-headline-info-meta b { color: var(--text); }
  .br-headline-isk {
    color: var(--highlight);
    font-size: 22px;
    font-weight: 700;
    text-align: right;
    white-space: nowrap;
  }
  .br-headline-time {
    color: var(--dim);
    font-size: 10px;
    text-align: right;
    margin-top: 4px;
  }

  /* Capital escalation markers (annotation overlay on cumulative ISK chart) */
  .br-cap-markers {
    color: var(--dim);
    font-size: 11px;
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }
  .br-cap-markers .marker {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .br-cap-markers .marker.side-a { color: var(--side-a); }
  .br-cap-markers .marker.side-b { color: var(--side-b); }
  .br-cap-markers .marker-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: currentColor;
  }

  /* Kill list */
  .br-kills {
    background: var(--panel-dark);
    border: 1px solid var(--border);
    padding: 0;
    margin-bottom: 14px;
  }
  .br-kills-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 2px;
  }
  .br-kill {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    align-items: center;
  }
  .br-kill:last-child { border-bottom: none; }
  .br-kill:hover { background: rgba(0, 200, 200, 0.04); }
  .br-kill-time {
    color: var(--dim);
    font-size: 11px;
  }
  .br-kill-info { color: var(--muted); }
  .br-kill-info b { color: var(--text); }
  .br-kill-info .br-kill-victim-side {
    display: inline-block;
    width: 8px;
    height: 8px;
    margin-right: 6px;
    border-radius: 50%;
    vertical-align: middle;
  }
  .br-kill-info .br-kill-victim-side.side-a { background: var(--side-a); }
  .br-kill-info .br-kill-victim-side.side-b { background: var(--side-b); }
  .br-kill-isk {
    color: var(--highlight);
    font-weight: 600;
    font-size: 12px;
    white-space: nowrap;
  }

  /* Loading + empty states */
  .br-loading,
  .br-empty {
    text-align: center;
    color: var(--dim);
    padding: 60px 20px;
    font-size: 13px;
  }
  .br-empty b { color: var(--muted); }

  /* Tablet — narrower right column but still side by side */
  @media (max-width: 1120px) {
    .br-split { grid-template-columns: minmax(0, 1fr) 320px; }
  }

  /* Mobile — collapse to single column, swap between Analysis/Killfeed via tabs */
  @media (max-width: 820px) {
    .wrap { padding: 0 12px 60px; margin-top: 16px; }
    .br-tabs { display: flex; }
    .br-split { grid-template-columns: 1fr; }
    .br-right {
      position: static;
      max-height: 70vh;
      top: auto;
    }
    /* Tab visibility — only one column visible at a time */
    body[data-mobile-view="analysis"] .br-right { display: none; }
    body[data-mobile-view="killfeed"] .br-left  { display: none; }

    .br-sides { grid-template-columns: 1fr; }
    .br-kill { grid-template-columns: 60px 1fr auto; gap: 8px; }
    .br-meta { gap: 10px; }
    .br-sys { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Toolbar (lets us point the mockup at any system + time window quickly) -->
  <div class="toolbar">
    <span class="lbl">SYSTEM</span>
    <input id="t-system"   value="J151817" placeholder="J155620" size="10" />
    <span class="lbl">WINDOW HOURS</span>
    <input id="t-hours"    value="24"      type="number" min="1" max="168" size="3" />
    <span class="lbl">MIN GAP MIN</span>
    <input id="t-gap"      value="5"       type="number" min="1" max="60"  size="3" title="Max gap between consecutive kills to count as same engagement" />
    <span class="lbl">MIN KILLS</span>
    <input id="t-min"      value="3"       type="number" min="1" max="50"  size="3" />
    <button id="t-load">LOAD</button>
    <button id="t-pickbest" title="Find busiest cluster in last 24h">FIND ACTIVE</button>
  </div>

  <!-- Mobile-only tabs to switch between Analysis and Killfeed columns -->
  <div class="br-tabs" id="mobile-tabs">
    <button class="br-tab active" data-view="analysis">ANALYSIS</button>
    <button class="br-tab"        data-view="killfeed">KILLFEED</button>
  </div>

  <!-- Two-column split. On mobile only one is visible at a time, controlled
       by the tabs above (via body[data-mobile-view="..."] CSS rule). -->
  <div class="br-split">
    <div class="br-left"  id="report-left"></div>
    <aside class="br-right" id="report-right"></aside>
  </div>

</div>

<script>
const BACKEND  = 'https://ws.anoikis.info';
const TYPE_NAMES = {}; // populated lazily via ESI
const NAME_CACHE = {}; // characterId/corporationId/allianceId -> name

// ────────────────────────────────────────────────────────────────────────
// HARDCODED WORMHOLE NAME → SYSTEM ID (small subset, just enough to demo)
// In production this would come from window.ANOIKIS_SYSTEMS.
// ────────────────────────────────────────────────────────────────────────
const SYS_BY_NAME = {
  'J151817': 31002230,
  'J155620': 31002476,
  'J111935': 31002075,
  'J173638': 31002543,
  'J150853': 31002386,
  'J160941': 31002329,
};
const SYS_META = {
  31002230: { name: 'J151817', class: 'C6' },
  31002476: { name: 'J155620', class: 'C2' },
  31002075: { name: 'J111935', class: 'C5' },
  31002543: { name: 'J173638', class: 'C4' },
  31002386: { name: 'J150853', class: 'C5' },
  31002329: { name: 'J160941', class: 'C5' },
};

// ────────────────────────────────────────────────────────────────────────
// FETCH
// ────────────────────────────────────────────────────────────────────────
async function fetchSystemKills(systemId) {
  const r = await fetch(`${BACKEND}/intel/${systemId}`);
  if (!r.ok) throw new Error(`intel ${r.status}`);
  const body = await r.json();
  return Array.isArray(body?.kills) ? body.kills : [];
}

async function resolveName(kind, id) {
  if (!id) return '';
  const key = kind + ':' + id;
  if (NAME_CACHE[key]) return NAME_CACHE[key];
  let url;
  if (kind === 'char') url = `https://esi.evetech.net/latest/characters/${id}/`;
  else if (kind === 'corp') url = `https://esi.evetech.net/latest/corporations/${id}/`;
  else if (kind === 'alliance') url = `https://esi.evetech.net/latest/alliances/${id}/`;
  else return '';
  try {
    const r = await fetch(url);
    if (!r.ok) return '';
    const j = await r.json();
    NAME_CACHE[key] = j.name || '';
    return NAME_CACHE[key];
  } catch { return ''; }
}

async function resolveType(typeId) {
  if (!typeId) return '';
  if (TYPE_NAMES[typeId]) return TYPE_NAMES[typeId];
  try {
    const r = await fetch(`https://esi.evetech.net/latest/universe/types/${typeId}/`);
    if (!r.ok) return '';
    const j = await r.json();
    TYPE_NAMES[typeId] = j.name || '';
    return TYPE_NAMES[typeId];
  } catch { return ''; }
}

// ────────────────────────────────────────────────────────────────────────
// CLUSTERING — the heart of the prototype.
// Group consecutive kills into engagements where gaps < maxGapSec.
// Pick the largest engagement in the window as "the fight" to display.
// ────────────────────────────────────────────────────────────────────────
function clusterKills(kills, maxGapSec) {
  // kills assumed sorted by ts ascending
  const sorted = kills.slice().sort((a, b) => a.ts - b.ts);
  const clusters = [];
  let cur = null;
  for (const k of sorted) {
    if (!cur || (k.ts - cur.lastTs) > maxGapSec) {
      cur = { kills: [k], firstTs: k.ts, lastTs: k.ts };
      clusters.push(cur);
    } else {
      cur.kills.push(k);
      cur.lastTs = k.ts;
    }
  }
  return clusters;
}

// ────────────────────────────────────────────────────────────────────────
// SIDE DETECTION — naive v0.
// Build a co-attacker graph: pilots that appear together as attackers in
// the same kill are linked. Connected components = sides.
// Then attribute each kill's victim to the OTHER side (if not in a side,
// assign to a synthetic "Unaffiliated" bucket).
// ────────────────────────────────────────────────────────────────────────
function detectSides(kills) {
  // Union-find over alliance IDs (fall back to corp ID if no alliance).
  const parent = new Map();
  function key(att) { return att.alliance_id || ('corp:' + att.corporation_id); }
  function find(x) {
    while (parent.get(x) !== x) {
      parent.set(x, parent.get(parent.get(x)));
      x = parent.get(x);
    }
    return x;
  }
  function union(a, b) {
    const ra = find(a), rb = find(b);
    if (ra !== rb) parent.set(ra, rb);
  }
  function ensure(x) { if (!parent.has(x)) parent.set(x, x); }

  // Link co-attackers within each kill.
  for (const k of kills) {
    const atts = (k.attackers || []).filter(a => a.alliance_id || a.corporation_id);
    if (atts.length === 0) continue;
    const keys = atts.map(key);
    keys.forEach(ensure);
    for (let i = 1; i < keys.length; i++) union(keys[0], keys[i]);
  }

  // Group everyone into components.
  const sideOfKey = new Map();
  for (const k of parent.keys()) {
    sideOfKey.set(k, find(k));
  }

  // Aggregate sides: pick the "main" identity (alliance > corp) and total weight.
  const sideStats = new Map();
  function side(root) {
    if (!sideStats.has(root)) {
      sideStats.set(root, {
        root,
        allianceIds: new Set(),
        corpIds: new Set(),
        pilotIds: new Set(),
        attackerCount: 0,
        killsScored: 0,
        killsLost: 0,
        iskKilled: 0,
        iskLost: 0,
        shipBreakdown: new Map(),
        classBrought: new Map(),
        classLost:    new Map(),
        // Top damage dealer tracking: characterId -> { damage, kills, ship }.
        // Pick the highest-damage pilot when rendering the "Carried by" line.
        damageByPilot: new Map(),
      });
    }
    return sideStats.get(root);
  }

  // Tag attacker side per kill, then victim side too.
  for (const k of kills) {
    const atts = (k.attackers || []);
    const attRoots = new Set();
    for (const a of atts) {
      if (!a.alliance_id && !a.corporation_id) continue;
      const root = sideOfKey.get(key(a));
      if (root) attRoots.add(root);
      const s = root ? side(root) : null;
      if (s) {
        if (a.alliance_id)    s.allianceIds.add(a.alliance_id);
        if (a.corporation_id) s.corpIds.add(a.corporation_id);
        if (a.character_id)   s.pilotIds.add(a.character_id);
        s.attackerCount++;
        if (a.character_id && a.ship_type_id) {
          const cls = shipClass(a.ship_type_id);
          if (!s.classBrought.has(cls)) s.classBrought.set(cls, new Set());
          s.classBrought.get(cls).add(a.character_id);
        }
        // Top damage dealer accumulation. damage_done is on each attacker
        // record per killmail; sum it across all kills the pilot participated
        // in. Also count kill participations and remember the most-used ship.
        if (a.character_id && a.damage_done) {
          let p = s.damageByPilot.get(a.character_id);
          if (!p) {
            p = { damage: 0, kills: 0, shipTypeId: a.ship_type_id || null };
            s.damageByPilot.set(a.character_id, p);
          }
          p.damage += a.damage_done;
          p.kills++;
        }
      }
    }

    // Victim side: try to find the victim's alliance/corp in any side.
    const victimKey = k.victim?.alliance_id ? k.victim.alliance_id
                    : (k.victim?.corporation_id ? 'corp:' + k.victim.corporation_id : null);
    let victimRoot = null;
    if (victimKey && sideOfKey.has(victimKey)) victimRoot = sideOfKey.get(victimKey);
    else if (victimKey) {
      ensure(victimKey);
      victimRoot = victimKey;
      sideOfKey.set(victimKey, victimKey);
    }

    if (victimRoot) {
      const vs = side(victimRoot);
      vs.killsLost++;
      vs.iskLost += k._zkbValue || k.value || 0;
      const tid = k.victim?.ship_type_id || k.shipTypeId;
      if (tid) {
        vs.shipBreakdown.set(tid, (vs.shipBreakdown.get(tid) || 0) + 1);
        const cls = shipClass(tid);
        vs.classLost.set(cls, (vs.classLost.get(cls) || 0) + 1);
        // The victim's ship counts toward "brought" for the side's fleet roster.
        if (k.victim?.character_id) {
          if (!vs.classBrought.has(cls)) vs.classBrought.set(cls, new Set());
          vs.classBrought.get(cls).add(k.victim.character_id);
        }
      }
      if (k.victim?.alliance_id)    vs.allianceIds.add(k.victim.alliance_id);
      if (k.victim?.corporation_id) vs.corpIds.add(k.victim.corporation_id);
      if (k.victim?.character_id)   vs.pilotIds.add(k.victim.character_id);
    }

    // Each attacker side gets credit for the kill (against THIS victim).
    for (const r of attRoots) {
      if (r === victimRoot) continue;
      const s = side(r);
      s.killsScored++;
      s.iskKilled += k._zkbValue || k.value || 0;
    }
  }

  // Convert to array, keep only sides that participated meaningfully.
  // Top 2 sides are the ones most heavily involved (kills scored + lost).
  // Ranking among them: the side that destroyed MORE ISK is 'b' (right column,
  // natural reading conclusion); the other is 'a' (left). Remaining go to 'other'.
  const all = Array.from(sideStats.values())
    .filter(s => s.killsScored + s.killsLost >= 1)
    .sort((a, b) => (b.killsScored + b.killsLost) - (a.killsScored + a.killsLost));
  const top2 = all.slice(0, 2);
  if (top2.length === 2) {
    // Higher iskKilled goes on the right (sideIdx='b').
    top2.sort((a, b) => a.iskKilled - b.iskKilled);
    top2[0].sideIdx = 'a';
    top2[1].sideIdx = 'b';
  } else if (top2.length === 1) {
    top2[0].sideIdx = 'a';
  }
  for (const s of all.slice(2)) s.sideIdx = 'other';
  return { sides: all, sideOfKey };
}

function shipClass(typeId) {
  for (const b of SHIP_CLASS_BUCKETS) {
    if (b.test(typeId)) return b.label;
  }
  return 'OTHER';
}

// ────────────────────────────────────────────────────────────────────────
// EVENT TYPE classification
// ────────────────────────────────────────────────────────────────────────
function classifyEvent(kills, sides) {
  const hasStructure = kills.some(k => k.kind === 'structure');
  const hasTower     = kills.some(k => k.kind === 'tower');
  const durationSec  = (kills[kills.length-1].ts - kills[0].ts) || 1;
  const killCount    = kills.length;

  if (hasStructure || hasTower) return { type: 'eviction', label: 'EVICTION' };

  // Side imbalance check
  if (sides.length >= 2) {
    const a = sides[0], b = sides[1];
    const totalKills = a.killsLost + b.killsLost;
    if (totalKills > 0) {
      const ratio = Math.min(a.killsLost, b.killsLost) / totalKills;
      if (ratio < 0.15) return { type: 'gank',  label: 'GANK' };
      if (killCount >= 10 && durationSec < 1800) return { type: 'good_fight', label: 'GOOD FIGHT' };
    }
  }
  return { type: 'brawl', label: 'BRAWL' };
}

// ────────────────────────────────────────────────────────────────────────
// FORMATTERS
// ────────────────────────────────────────────────────────────────────────
function formatIsk(v) {
  if (!v) return '0';
  if (v >= 1e12) return (v/1e12).toFixed(1) + 'T';
  if (v >= 1e9)  return (v/1e9).toFixed(1)  + 'B';
  if (v >= 1e6)  return (v/1e6).toFixed(0)  + 'M';
  if (v >= 1e3)  return (v/1e3).toFixed(0)  + 'K';
  return v.toFixed(0);
}
function formatTime(ts) {
  const d = new Date(ts * 1000);
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}`;
}
function formatDateRange(startTs, endTs) {
  const d1 = new Date(startTs * 1000);
  const d2 = new Date(endTs * 1000);
  const pad = n => String(n).padStart(2, '0');
  const date = `${d1.getUTCFullYear()}-${pad(d1.getUTCMonth()+1)}-${pad(d1.getUTCDate())}`;
  const t1 = `${pad(d1.getUTCHours())}:${pad(d1.getUTCMinutes())}`;
  const t2 = `${pad(d2.getUTCHours())}:${pad(d2.getUTCMinutes())}`;
  const durSec = endTs - startTs;
  const durStr = durSec < 60 ? `${durSec}s` : durSec < 3600 ? `${Math.floor(durSec/60)}m` : `${Math.floor(durSec/3600)}h ${Math.floor((durSec%3600)/60)}m`;
  return `${date} ${t1} → ${t2} UTC (${durStr})`;
}

// ────────────────────────────────────────────────────────────────────────
// RENDER
// ────────────────────────────────────────────────────────────────────────
function el(html) {
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstChild;
}

// Cumulative ISK lost per side over time. Each side's polyline traces total
// ISK they've LOST (i.e. the value of ships destroyed FROM their side) up to
// each moment. Diverging lines visualize who's "losing" the fight at any point.
function renderTimeline(kills, sideOfKey, sides) {
  const startTs = kills[0].ts, endTs = kills[kills.length-1].ts;
  const span = Math.max(1, endTs - startTs);

  // Map sideRoot → 'a' | 'b' so we can attribute each kill's victim to a side.
  const root2idx = new Map();
  for (const s of sides) root2idx.set(s.root, s.sideIdx);

  // Build cumulative loss series per side. We sample at every kill event so
  // the line steps up exactly when something explodes — no smoothing.
  const seriesA = [{ t: 0, isk: 0 }];
  const seriesB = [{ t: 0, isk: 0 }];
  let cumA = 0, cumB = 0;
  for (const k of kills) {
    const value = k._zkbValue || k.value || 0;
    const tFrac = (k.ts - startTs) / span;
    const victimKey = k.victim?.alliance_id ? k.victim.alliance_id
                    : (k.victim?.corporation_id ? 'corp:' + k.victim.corporation_id : null);
    const root = victimKey ? sideOfKey.get(victimKey) : null;
    const sideIdx = root ? root2idx.get(root) : null;
    if (sideIdx === 'a') cumA += value;
    if (sideIdx === 'b') cumB += value;
    seriesA.push({ t: tFrac, isk: cumA });
    seriesB.push({ t: tFrac, isk: cumB });
  }

  const maxIsk = Math.max(cumA, cumB, 1);

  // SVG layout: 100x100 user-space; padding leaves room for labels.
  const W = 1000, H = 160;
  const padL = 56, padR = 12, padT = 12, padB = 22;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  function x(tFrac) { return padL + tFrac * plotW; }
  function y(isk)   { return padT + (1 - isk / maxIsk) * plotH; }

  function pathFor(series) {
    if (series.length === 0) return '';
    return series.map((p, i) => `${i === 0 ? 'M' : 'L'}${x(p.t).toFixed(1)},${y(p.isk).toFixed(1)}`).join(' ');
  }
  function areaFor(series) {
    if (series.length === 0) return '';
    const p = pathFor(series);
    const last = series[series.length - 1];
    return `${p} L${x(last.t).toFixed(1)},${y(0).toFixed(1)} L${x(0).toFixed(1)},${y(0).toFixed(1)} Z`;
  }

  // Y-axis tick values: 0, 25%, 50%, 75%, 100% of maxIsk (rounded to nice numbers).
  const yTicks = [0, 0.25, 0.5, 0.75, 1.0];

  // Friendly names for legend.
  const sideAName = sides.find(s => s.sideIdx === 'a')?.label || 'Side A';
  const sideBName = sides.find(s => s.sideIdx === 'b')?.label || 'Side B';

  const tl = el(`<div class="br-timeline">
    <div class="br-timeline-label">
      <span>ISK DESTROYED OVER TIME · ${kills.length} KILLS</span>
      <span class="br-timeline-legend">
        <span class="br-timeline-legend-item">
          <span class="br-timeline-legend-swatch" style="background: var(--side-a)"></span>
          <span style="color: var(--side-a)">${escapeHtml(sideAName)}</span>
        </span>
        <span class="br-timeline-legend-item">
          <span class="br-timeline-legend-swatch" style="background: var(--side-b)"></span>
          <span style="color: var(--side-b)">${escapeHtml(sideBName)}</span>
        </span>
      </span>
    </div>
    <svg class="br-timeline-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      ${yTicks.map(t => `
        <line class="grid-line" x1="${padL}" x2="${W - padR}" y1="${(padT + (1-t)*plotH).toFixed(1)}" y2="${(padT + (1-t)*plotH).toFixed(1)}" />
        <text class="axis-text" x="${padL - 6}" y="${(padT + (1-t)*plotH + 3).toFixed(1)}" text-anchor="end">${formatIsk(maxIsk * t)}</text>
      `).join('')}
      <path class="area-a" d="${areaFor(seriesA)}" />
      <path class="area-b" d="${areaFor(seriesB)}" />
      <path class="line-a" d="${pathFor(seriesA)}" />
      <path class="line-b" d="${pathFor(seriesB)}" />
    </svg>
    <div class="br-timeline-axis">
      <span>${formatTime(startTs)}</span>
      <span>${formatTime(Math.floor((startTs + endTs) / 2))}</span>
      <span>${formatTime(endTs)}</span>
    </div>
  </div>`);
  return tl;
}

// Mirror comparison bar: each side's total ISK lost rendered as opposing bars
// from a center divider. Wider bar = more ISK lost = "the loser" visually.
function renderCompareBar(sides) {
  const a = sides.find(s => s.sideIdx === 'a');
  const b = sides.find(s => s.sideIdx === 'b');
  if (!a || !b) return null;
  const max = Math.max(a.iskLost, b.iskLost, 1);
  const aPct = (a.iskLost / max * 100).toFixed(1);
  const bPct = (b.iskLost / max * 100).toFixed(1);

  return el(`<div class="br-compare">
    <div class="br-compare-label">ISK LOST · MIRROR COMPARISON</div>
    <div class="br-compare-row">
      <div class="br-compare-side left">
        <span class="br-compare-isk side-a">${formatIsk(a.iskLost)}</span>
        <div class="br-compare-bar-wrap">
          <div class="br-compare-bar side-a" style="width: ${aPct}%"></div>
        </div>
      </div>
      <div class="br-compare-divider"></div>
      <div class="br-compare-side right">
        <div class="br-compare-bar-wrap">
          <div class="br-compare-bar side-b" style="width: ${bPct}%"></div>
        </div>
        <span class="br-compare-isk side-b">${formatIsk(b.iskLost)}</span>
      </div>
    </div>
  </div>`);
}

async function resolveSideLabel(side) {
  if (side.allianceIds.size > 0) {
    const id = Array.from(side.allianceIds)[0];
    return (await resolveName('alliance', id)) || `Alliance ${id}`;
  } else if (side.corpIds.size > 0) {
    const id = Array.from(side.corpIds)[0];
    return (await resolveName('corp', id)) || `Corp ${id}`;
  }
  return '—';
}

async function renderSide(side, sideIdx) {
  const label = side.label || (await resolveSideLabel(side));
  const cls = sideIdx === 'a' ? 'side-a' : (sideIdx === 'b' ? 'side-b' : '');

  // Build ship-class breakdown rows: BS / BC / Cruiser / Dessie / Frig / Cap / Indy.
  // Each row shows: brought count, "lost / brought" and a bar with red overlay for lost.
  const ORDER = ['CAPITAL', 'BS', 'BC', 'CRUISER', 'DESSIE', 'FRIG', 'INDY', 'OTHER'];
  const rows = [];
  let maxBrought = 1;
  for (const cls of ORDER) {
    const brought = side.classBrought.get(cls)?.size || 0;
    const lost    = side.classLost.get(cls) || 0;
    if (brought === 0 && lost === 0) continue;
    rows.push({ cls, brought, lost });
    if (brought > maxBrought) maxBrought = brought;
  }

  const pilots = side.pilotIds.size;
  const ships  = rows.reduce((s, r) => s + r.brought, 0);
  const lost   = rows.reduce((s, r) => s + r.lost, 0);

  // Top damage dealer for this side
  let carriedBy = '';
  if (side.damageByPilot.size > 0) {
    const top = Array.from(side.damageByPilot.entries())
      .map(([id, stats]) => ({ id, ...stats }))
      .sort((a, b) => b.damage - a.damage)[0];
    if (top && top.damage > 0) {
      const name = (await resolveName('char', top.id)) || `Pilot ${top.id}`;
      const dmgM = (top.damage / 1e6).toFixed(1);
      carriedBy = `<div class="br-side-carry">
        <span class="br-side-carry-star">★</span>
        Carried by <b>${escapeHtml(name)}</b> · <b>${dmgM}M</b> dmg · <b>${top.kills}</b> kill${top.kills===1?'':'s'}
      </div>`;
    }
  }

  const div = el(`<div class="br-side ${cls}">
    <div class="br-side-name ${cls}">${escapeHtml(label)}</div>
    <div class="br-side-stats">
      <b>${pilots}</b> pilot${pilots===1?'':'s'} · <b>${ships}</b> ship${ships===1?'':'s'} · <b>${lost}</b> lost ·
      ISK destroyed <b>${formatIsk(side.iskKilled)}</b> · lost <b>${formatIsk(side.iskLost)}</b>
    </div>
    ${carriedBy}
    <div class="br-class-rows">
      ${rows.map(r => {
        const broughtPct = (r.brought / maxBrought * 100).toFixed(1);
        const lostOverlayPct = r.brought > 0 ? (r.lost / maxBrought * 100).toFixed(1) : 0;
        return `<div class="br-class-row">
          <span class="br-class-row-label">${r.cls}</span>
          <span class="br-class-row-count">${r.brought}${r.lost ? ` <span style="color:var(--danger)">-${r.lost}</span>` : ''}</span>
          <div class="br-class-row-bar-wrap">
            <div class="br-class-row-bar-bg" style="width: ${broughtPct}%"></div>
            ${r.lost > 0 ? `<div class="br-class-row-bar-lost" style="width: ${lostOverlayPct}%"></div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`);
  return div;
}

// Vertical ISK efficiency divider — sits between the two side cards. Top
// portion is side A's share of ISK destroyed; bottom is side B's. Functions
// as both visual divider AND the efficiency meter.
function renderEfficiencyVertical(sides) {
  const a = sides.find(s => s.sideIdx === 'a');
  const b = sides.find(s => s.sideIdx === 'b');
  if (!a || !b) return null;
  const total = a.iskKilled + b.iskKilled;
  if (total === 0) return null;
  const aPct = (a.iskKilled / total * 100);
  const bPct = 100 - aPct;
  return el(`<div class="br-eff-vertical">
    <div class="br-eff-vertical-label">EFF</div>
    <div class="br-eff-vertical-fill side-a" style="height: ${aPct.toFixed(1)}%">${aPct >= 18 ? aPct.toFixed(0) + '%' : ''}</div>
    <div class="br-eff-vertical-fill side-b" style="height: ${bPct.toFixed(1)}%">${bPct >= 18 ? bPct.toFixed(0) + '%' : ''}</div>
    <div class="br-eff-vertical-divider" style="top: ${aPct.toFixed(1)}%"></div>
  </div>`);
}

// Headline kill — the biggest single loss in the engagement, displayed as
// a visually distinct card below the side cards. The fight's emotional
// center of gravity. Pilots remember battles by this kill.
async function renderHeadline(kills, sideOfKey, root2idx) {
  const biggest = kills.slice().sort((a, b) => (b._zkbValue || b.value || 0) - (a._zkbValue || a.value || 0))[0];
  if (!biggest) return null;
  const value = biggest._zkbValue || biggest.value || 0;
  const tid = biggest.victim?.ship_type_id || biggest.shipTypeId;
  const shipName = (await resolveType(tid)) || 'Unknown';
  const renderUrl = tid ? `https://images.evetech.net/types/${tid}/render?size=128` : '';
  const corpName = (await resolveName('corp', biggest.victim?.corporation_id)) || '—';
  const pilotName = biggest.victim?.character_id
    ? ((await resolveName('char', biggest.victim.character_id)) || '')
    : '';

  // Killer side + label
  const fb = (biggest.attackers || []).find(a => a.final_blow);
  const killerCorp = fb ? (await resolveName('corp', fb.corporation_id)) || '' : '';

  return el(`<div class="br-headline">
    <div class="br-headline-img" ${renderUrl ? `style="background-image:url('${renderUrl}')"` : ''}></div>
    <div class="br-headline-info">
      <div class="br-headline-info-label">★ HEADLINE KILL</div>
      <div class="br-headline-info-ship">${escapeHtml(shipName)}</div>
      <div class="br-headline-info-meta">
        ${pilotName ? `<b>${escapeHtml(pilotName)}</b> · ` : ''}${escapeHtml(corpName)}
        ${killerCorp ? ` · killed by <b>${escapeHtml(killerCorp)}</b>` : ''}
      </div>
    </div>
    <div>
      <div class="br-headline-isk">${formatIsk(value)}</div>
      <div class="br-headline-time">${formatTime(biggest.ts)}</div>
    </div>
  </div>`);
}

// Capital escalation markers — a small inline list shown UNDER the
// cumulative ISK chart. For each capital-class kill in the engagement,
// label the moment it dropped + which side lost it. Tells the dramatic
// micro-narrative of "the supers showed up at minute 22."
function renderCapEscalation(kills, sideOfKey, root2idx) {
  const caps = [];
  for (const k of kills) {
    const tid = k.victim?.ship_type_id || k.shipTypeId;
    if (!tid || !CAPITAL_TYPE_IDS.has(tid)) continue;
    const victimKey = k.victim?.alliance_id ? k.victim.alliance_id
                    : (k.victim?.corporation_id ? 'corp:' + k.victim.corporation_id : null);
    const root = victimKey ? sideOfKey.get(victimKey) : null;
    const sideIdx = root ? root2idx.get(root) : null;
    caps.push({ ts: k.ts, tid, sideIdx });
  }
  if (caps.length === 0) return null;
  caps.sort((a, b) => a.ts - b.ts);
  const html = caps.map(c => {
    const cls = c.sideIdx === 'a' ? 'side-a' : (c.sideIdx === 'b' ? 'side-b' : '');
    const name = TYPE_NAMES[c.tid] || `Cap ${c.tid}`;
    return `<span class="marker ${cls}">
      <span class="marker-dot"></span>
      ${escapeHtml(name)} · ${formatTime(c.ts)}
    </span>`;
  }).join('');
  return el(`<div class="br-cap-markers">★ CAP ESCALATIONS · ${html}</div>`);
}

// Fleet strength over time — count of unique pilots per side that have appeared
// in any kill (attacker or victim) up to each kill's timestamp. Once a pilot is
// "seen" they remain counted (we don't have logoff info from killmails alone,
// so this represents "cumulative known fleet size" which is the best proxy).
function renderFleetStrength(kills, sideOfKey, sides) {
  const startTs = kills[0].ts, endTs = kills[kills.length-1].ts;
  const span = Math.max(1, endTs - startTs);

  const root2idx = new Map();
  for (const s of sides) root2idx.set(s.root, s.sideIdx);
  function key(att) { return att.alliance_id || ('corp:' + att.corporation_id); }

  // Build timeseries: at each kill timestamp, what's the cumulative unique
  // pilot count for each side?
  const seenA = new Set(), seenB = new Set();
  const seriesA = [{ t: 0, n: 0 }];
  const seriesB = [{ t: 0, n: 0 }];

  for (const k of kills) {
    const tFrac = (k.ts - startTs) / span;
    // Process all attackers
    for (const a of (k.attackers || [])) {
      if (!a.character_id) continue;
      if (!a.alliance_id && !a.corporation_id) continue;
      const root = sideOfKey.get(key(a));
      const idx = root ? root2idx.get(root) : null;
      if (idx === 'a') seenA.add(a.character_id);
      else if (idx === 'b') seenB.add(a.character_id);
    }
    // And the victim
    const v = k.victim;
    if (v?.character_id) {
      const vKey = v.alliance_id || (v.corporation_id ? 'corp:' + v.corporation_id : null);
      const root = vKey ? sideOfKey.get(vKey) : null;
      const idx = root ? root2idx.get(root) : null;
      if (idx === 'a') seenA.add(v.character_id);
      else if (idx === 'b') seenB.add(v.character_id);
    }
    seriesA.push({ t: tFrac, n: seenA.size });
    seriesB.push({ t: tFrac, n: seenB.size });
  }

  const maxN = Math.max(seenA.size, seenB.size, 1);

  const W = 1000, H = 120;
  const padL = 56, padR = 12, padT = 12, padB = 22;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  function x(tFrac) { return padL + tFrac * plotW; }
  function y(n)     { return padT + (1 - n / maxN) * plotH; }

  function pathFor(series) {
    return series.map((p, i) => `${i === 0 ? 'M' : 'L'}${x(p.t).toFixed(1)},${y(p.n).toFixed(1)}`).join(' ');
  }
  function areaFor(series) {
    const p = pathFor(series);
    const last = series[series.length - 1];
    return `${p} L${x(last.t).toFixed(1)},${y(0).toFixed(1)} L${x(0).toFixed(1)},${y(0).toFixed(1)} Z`;
  }

  const yTicks = [0, 0.5, 1.0];
  const sideAName = sides.find(s => s.sideIdx === 'a')?.label || 'Side A';
  const sideBName = sides.find(s => s.sideIdx === 'b')?.label || 'Side B';

  return el(`<div class="br-timeline">
    <div class="br-timeline-label">
      <span>FLEET STRENGTH OVER TIME · ${seenA.size} vs ${seenB.size} PILOTS</span>
      <span class="br-timeline-legend">
        <span class="br-timeline-legend-item">
          <span class="br-timeline-legend-swatch" style="background: var(--side-a)"></span>
          <span style="color: var(--side-a)">${escapeHtml(sideAName)}</span>
        </span>
        <span class="br-timeline-legend-item">
          <span class="br-timeline-legend-swatch" style="background: var(--side-b)"></span>
          <span style="color: var(--side-b)">${escapeHtml(sideBName)}</span>
        </span>
      </span>
    </div>
    <svg class="br-timeline-svg br-fleet-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      ${yTicks.map(t => `
        <line class="grid-line" x1="${padL}" x2="${W - padR}" y1="${(padT + (1-t)*plotH).toFixed(1)}" y2="${(padT + (1-t)*plotH).toFixed(1)}" />
        <text class="axis-text" x="${padL - 6}" y="${(padT + (1-t)*plotH + 3).toFixed(1)}" text-anchor="end">${Math.round(maxN * t)}</text>
      `).join('')}
      <path class="area-a" d="${areaFor(seriesA)}" />
      <path class="area-b" d="${areaFor(seriesB)}" />
      <path class="line-a" d="${pathFor(seriesA)}" />
      <path class="line-b" d="${pathFor(seriesB)}" />
    </svg>
    <div class="br-timeline-axis">
      <span>${formatTime(startTs)}</span>
      <span>${formatTime(Math.floor((startTs + endTs) / 2))}</span>
      <span>${formatTime(endTs)}</span>
    </div>
  </div>`);
}

async function renderKill(kill, sideOfKey) {
  const victimKey = kill.victim?.alliance_id ? kill.victim.alliance_id
                  : (kill.victim?.corporation_id ? 'corp:' + kill.victim.corporation_id : null);
  const sideRoot = victimKey ? sideOfKey.get(victimKey) : null;
  // Map sideRoot back to sideIdx — we need a lookup table; passed in via outer scope.
  const shipName = (await resolveType(kill.victim?.ship_type_id || kill.shipTypeId)) || 'Unknown';
  const corpName = (await resolveName('corp', kill.victim?.corporation_id)) || '—';
  const fb       = (kill.attackers || []).find(a => a.final_blow);
  const fbCorp   = fb ? (await resolveName('corp', fb.corporation_id)) || '—' : '—';
  const attCount = (kill.attackers || []).length;
  const div = el(`<div class="br-kill">
    <div class="br-kill-time">${formatTime(kill.ts)}</div>
    <div class="br-kill-info">
      <span class="br-kill-victim-side" data-root="${sideRoot || ''}"></span>
      <b>${escapeHtml(shipName)}</b> · ${escapeHtml(corpName)}
      <div style="color:var(--dim); font-size:11px; margin-top:2px;">
        FB ${escapeHtml(fbCorp)} · ${attCount} attacker${attCount===1?'':'s'}
      </div>
    </div>
    <div class="br-kill-isk">${formatIsk(kill._zkbValue || kill.value || 0)}</div>
  </div>`);
  return div;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ────────────────────────────────────────────────────────────────────────
// MAIN
// ────────────────────────────────────────────────────────────────────────
async function loadAndRender() {
  const sysName  = document.getElementById('t-system').value.trim().toUpperCase();
  const hours    = Number(document.getElementById('t-hours').value) || 24;
  const gapMin   = Number(document.getElementById('t-gap').value) || 5;
  const minKills = Number(document.getElementById('t-min').value) || 3;

  const systemId = SYS_BY_NAME[sysName];
  const left  = document.getElementById('report-left');
  const right = document.getElementById('report-right');
  if (!systemId) {
    left.innerHTML = `<div class="br-empty"><b>Unknown system.</b><br>Try J151817, J155620, J111935, J173638, J150853, J160941.</div>`;
    right.innerHTML = '';
    return;
  }
  left.innerHTML = `<div class="br-loading">Loading kills for ${sysName}…</div>`;
  right.innerHTML = `<div class="br-feed-header">Loading…</div>`;

  let allKills;
  try {
    allKills = await fetchSystemKills(systemId);
  } catch (e) {
    left.innerHTML  = `<div class="br-empty"><b>Failed to load:</b> ${escapeHtml(e.message)}</div>`;
    right.innerHTML = '';
    return;
  }

  // Filter: PvP only (no NPCs), within window
  const cutoff = Math.floor(Date.now() / 1000) - hours * 3600;
  const kills = allKills.filter(k => !k.isNpc && k.ts >= cutoff);

  if (kills.length < minKills) {
    left.innerHTML  = `<div class="br-empty">No engagements in last <b>${hours}h</b> in <b>${sysName}</b><br>Found ${kills.length} PvP kill${kills.length===1?'':'s'}, need ≥${minKills} for an engagement.</div>`;
    right.innerHTML = '';
    return;
  }

  // Cluster kills into engagements, pick the largest
  const clusters = clusterKills(kills, gapMin * 60);
  const interesting = clusters.filter(c => c.kills.length >= minKills);
  if (interesting.length === 0) {
    left.innerHTML  = `<div class="br-empty">No clusters of ≥${minKills} kills in last <b>${hours}h</b> in <b>${sysName}</b><br>Found ${clusters.length} smaller cluster${clusters.length===1?'':'s'}.</div>`;
    right.innerHTML = '';
    return;
  }
  const cluster = interesting.sort((a,b) => b.kills.length - a.kills.length)[0];

  // Side detection
  const { sides, sideOfKey } = detectSides(cluster.kills);
  const event = classifyEvent(cluster.kills, sides);
  const meta  = SYS_META[systemId];

  // Pre-resolve the top-2 side labels so the timeline legend and compare bar
  // can show real alliance/corp names instead of "Side A"/"Side B".
  for (const s of sides.slice(0, 2)) {
    s.label = await resolveSideLabel(s);
  }

  // Side-root → side index lookup, used by both columns.
  const root2idx = new Map();
  for (const s of sides) root2idx.set(s.root, s.sideIdx);

  // ── LEFT COLUMN — analysis ─────────────────────────────────────────
  left.innerHTML = '';

  // Header
  const totalIsk = cluster.kills.reduce((s, k) => s + (k._zkbValue || k.value || 0), 0);
  const header = el(`<div class="br-header">
    <div class="br-title">
      <span class="br-sys">${escapeHtml(meta.name)}</span>
      <span class="br-class">· ${escapeHtml(meta.class)}</span>
      <span class="br-type ${event.type}">${event.label}</span>
    </div>
    <div class="br-meta">
      <span>${formatDateRange(cluster.firstTs, cluster.lastTs)}</span>
      <span><b>${cluster.kills.length}</b> kills</span>
      <span><b>${formatIsk(totalIsk)}</b> ISK destroyed</span>
      <span><b>${sides.length}</b> side${sides.length===1?'':'s'}</span>
    </div>
  </div>`);
  left.appendChild(header);

  // Cumulative ISK destroyed over time (full-width across both side columns)
  left.appendChild(renderTimeline(cluster.kills, sideOfKey, sides));

  // Capital escalations — only if the fight involved capitals; otherwise null
  const caps = renderCapEscalation(cluster.kills, sideOfKey, root2idx);
  if (caps) left.appendChild(caps);

  // Two-side layout: side A | vertical efficiency divider | side B
  // Top 2 sides only (more sides shown as a small "other" line below)
  const sidesWrap = el(`<div class="br-sides-wrap"></div>`);
  const sideA = sides.find(s => s.sideIdx === 'a');
  const sideB = sides.find(s => s.sideIdx === 'b');
  if (sideA) sidesWrap.appendChild(await renderSide(sideA, 'a'));
  const effDivider = renderEfficiencyVertical(sides);
  if (effDivider) sidesWrap.appendChild(effDivider);
  else sidesWrap.appendChild(el('<div></div>')); // placeholder to keep grid alignment
  if (sideB) sidesWrap.appendChild(await renderSide(sideB, 'b'));
  left.appendChild(sidesWrap);

  // Headline kill — biggest single loss, full width below side cards
  const headline = await renderHeadline(cluster.kills, sideOfKey, root2idx);
  if (headline) left.appendChild(headline);

  // "Other sides" small note if 3+ sides exist
  if (sides.length > 2) {
    const extraSides = sides.slice(2);
    const extraKills = extraSides.reduce((s,x) => s + x.killsScored + x.killsLost, 0);
    const extra = el(`<div class="br-empty" style="padding:10px; font-size:11px; text-align:left; background:var(--panel-dark); border:1px solid var(--border); color:var(--dim);">
      + ${extraSides.length} other side${extraSides.length===1?'':'s'} · ${extraKills} kill${extraKills===1?'':'s'} · grouped as "Other"
    </div>`);
    left.appendChild(extra);
  }

  // ── RIGHT COLUMN — system killfeed (this engagement only, newest first) ─
  await renderKillfeed(right, cluster, sideOfKey, root2idx);
}

// Right-column killfeed mirroring the live killfeed UX. Renders each kill
// as a row with ship render image, ship name, victim pilot, victim corp,
// ISK value, and time. A 3px stripe on the row's left edge indicates which
// side the victim belongs to (matches chart colors).
async function renderKillfeed(mount, cluster, sideOfKey, root2idx) {
  mount.innerHTML = '';
  const headerEl = el(`<div class="br-feed-header">
    SYSTEM KILLFEED · <b>${cluster.kills.length}</b> KILLS · NEWEST FIRST
  </div>`);
  mount.appendChild(headerEl);

  const listEl = el(`<div class="br-feed-list"></div>`);
  mount.appendChild(listEl);

  // Newest first to match live killfeed UX.
  const sorted = cluster.kills.slice().sort((a, b) => b.ts - a.ts);
  for (const k of sorted) {
    const victimKey = k.victim?.alliance_id ? k.victim.alliance_id
                    : (k.victim?.corporation_id ? 'corp:' + k.victim.corporation_id : null);
    const root = victimKey ? sideOfKey.get(victimKey) : null;
    const sideIdx = root ? root2idx.get(root) : null;
    const sideClass = sideIdx === 'a' ? 'side-a' : (sideIdx === 'b' ? 'side-b' : '');

    const tid = k.victim?.ship_type_id || k.shipTypeId;
    const shipName = (await resolveType(tid)) || 'Unknown';
    const corpName = (await resolveName('corp', k.victim?.corporation_id)) || '—';
    const pilotName = k.victim?.character_id
      ? ((await resolveName('char', k.victim.character_id)) || `Pilot ${k.victim.character_id}`)
      : '—';
    const renderUrl = tid ? `https://images.evetech.net/types/${tid}/render?size=128` : '';

    const row = el(`<div class="br-feed-row ${sideClass}">
      <div class="br-feed-img" ${renderUrl ? `style="background-image:url('${renderUrl}')"` : ''}></div>
      <div class="br-feed-info">
        <div class="br-feed-info-ship">${escapeHtml(shipName)}</div>
        <div class="br-feed-info-pilot">${escapeHtml(pilotName)}</div>
        <div class="br-feed-info-corp">${escapeHtml(corpName)}</div>
      </div>
      <div class="br-feed-meta">
        <div class="br-feed-isk">${formatIsk(k._zkbValue || k.value || 0)}</div>
        <div class="br-feed-time">${formatTime(k.ts)}</div>
      </div>
    </div>`);
    listEl.appendChild(row);
  }
}

async function findActive() {
  // Iterate the system list; for each, count last-24h PvP kills, pick the busiest.
  const ids = Object.keys(SYS_BY_NAME);
  const cutoff = Math.floor(Date.now() / 1000) - 24 * 3600;
  let best = null;
  for (const name of ids) {
    const sysId = SYS_BY_NAME[name];
    try {
      const kills = await fetchSystemKills(sysId);
      const recent = kills.filter(k => !k.isNpc && k.ts >= cutoff);
      if (!best || recent.length > best.count) {
        best = { name, count: recent.length };
      }
    } catch {}
  }
  if (best) {
    document.getElementById('t-system').value = best.name;
    loadAndRender();
  }
}

// Wire up
document.getElementById('t-load').addEventListener('click', loadAndRender);
document.getElementById('t-pickbest').addEventListener('click', findActive);
document.getElementById('t-system').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadAndRender();
});

// Mobile tabs (only visible <820px). Set body data-attr to control which
// column is shown via the CSS rule.
document.body.dataset.mobileView = 'analysis';
for (const tab of document.querySelectorAll('.br-tab')) {
  tab.addEventListener('click', () => {
    const view = tab.dataset.view;
    document.body.dataset.mobileView = view;
    for (const t of document.querySelectorAll('.br-tab')) {
      t.classList.toggle('active', t.dataset.view === view);
    }
  });
}

// Auto-load on first paint
loadAndRender();
</script>
