name: Update SDE data

on:
  schedule:
    # Runs every 2 days at 04:00 UTC
    - cron: '0 4 */2 * *'
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check if SDE has a new build
        id: sde_check
        run: |
          RAW=$(curl -sf "https://developers.eveonline.com/static-data/tranquility/latest.jsonl")
          echo "Raw latest.jsonl: $RAW"
          LATEST=$(echo "$RAW" | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          if not raw:
              print('')
          else:
              obj = json.loads(raw)
              # Try common field names
              print(obj.get('buildId') or obj.get('build_id') or obj.get('id') or obj.get('version') or '')
          ")
          echo "Remote build: $LATEST"

          CACHE_FILE=".github/sde_build_id.txt"
          CACHED=$(cat "$CACHE_FILE" 2>/dev/null || echo "")
          echo "Cached build: $CACHED"

          if [ "$LATEST" = "$CACHED" ] && [ -n "$LATEST" ]; then
            echo "SDE unchanged, skipping."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "SDE has changed (or first run)."
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "$LATEST" > "$CACHE_FILE"
          fi

      - name: Download and extract SDE JSONL files
        if: steps.sde_check.outputs.changed == 'true'
        run: |
          mkdir -p build/sde_cache
          echo "Downloading SDE JSONL zip..."
          curl -L "https://developers.eveonline.com/static-data/eve-online-static-data-latest-jsonl.zip" -o /tmp/sde.zip
          echo "Extracting needed files..."
          unzip -j /tmp/sde.zip \
            "types.jsonl" \
            "groups.jsonl" \
            "mapSolarSystems.jsonl" \
            "mapRegions.jsonl" \
            "mapConstellations.jsonl" \
            "mapSecondarySuns.jsonl" \
            -d build/sde_cache/
          rm /tmp/sde.zip
          echo "Extracted files:"
          ls -lh build/sde_cache/

      - name: Run build scripts
        if: steps.sde_check.outputs.changed == 'true'
        run: |
          python3 build/build_types.py
          python3 build/build_systems.py

      - name: Commit if data changed
        if: steps.sde_check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            data/type-kinds.js \
            data/anoikis-systems.js \
            backend/src/type-kinds.json \
            .github/sde_build_id.txt

          if git diff --cached --quiet; then
            echo "Data files unchanged after rebuild, nothing to commit."
          else
            git commit -m "chore: update SDE data"
            git push
          fi
