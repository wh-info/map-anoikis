<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>map.anoikis.info</title>
<link rel="stylesheet" href="./styles/main.css" />
</head>
<body>

<canvas id="map"></canvas>

<!-- Screen corner decorations -->
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<!-- LEFT PANEL: search + system info -->
<div id="panel-left" class="panel">
  <div class="brand">
    <div class="brand-dot"></div>
    <div style="flex: 1;">
      <div class="brand-title">map.anoikis.info<span class="cursor-blink">_</span></div>
      <div class="brand-sub" id="star-count">0 systems</div>
    </div>
    <button class="panel-hide-btn" id="hide-left" title="Hide panel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <input id="search" type="text" placeholder="Search system (e.g. J123456)" autocomplete="off" spellcheck="false" />
  <div id="search-results"></div>

  <div id="system-info" class="empty">
    <div class="title">System</div>
    <div class="info-body">
      <div class="sys-name" id="si-name">—</div>
      <div class="info-row" id="si-jcode-row" style="display:none;"><span class="k">J-code</span><span class="v" id="si-jcode">—</span></div>
      <div class="info-row"><span class="k">Class</span><span class="v" id="si-class">—</span></div>
      <div class="info-row"><span class="k">Region</span><span class="v" id="si-region">—</span></div>
      <div class="info-row"><span class="k">Constellation</span><span class="v" id="si-const">—</span></div>
      <div class="info-row"><span class="k">Effect</span><span class="v" id="si-effect">—</span></div>
      <div class="statics" id="si-statics"></div>
    </div>
  </div>
</div>

<!-- RIGHT PANEL: kill feed -->
<div id="panel-right" class="panel">
  <div id="kill-header">
    <div class="title" style="margin: 0;"><span class="pulse-dot"></span>Live Kills</div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <div style="font-size: 10px; color: var(--dim);" id="kill-count">0 shown</div>
      <button class="panel-hide-btn" id="hide-right" title="Hide panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
  <div id="kill-list"></div>
  <div id="kill-footer">
    <button class="kill-footer-hdr" id="kill-footer-toggle">
      <span>Filter</span>
      <svg class="kill-footer-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div id="kill-filters">
      <span class="kind-chip on" data-kind="ship"       title="Ships (frigates through titans, pods)">Ships</span>
      <span class="kind-chip on" data-kind="structure"  title="Upwell structures (Citadels, Engineering Complexes, Refineries, …)">Structures</span>
      <span class="kind-chip" data-kind="tower"      title="POS Control Towers">Towers</span>
      <span class="kind-chip" data-kind="fighter"    title="Carrier / supercarrier fighters">Fighters</span>
      <span class="kind-chip" data-kind="deployable" title="Mobile Depots, MTUs, Cyno Inhibitors, …">Deployables</span>
    </div>
  </div>
</div>


<!-- Restore buttons (visible when panels are hidden) -->
<button class="panel-restore-btn" id="restore-left" title="Show search &amp; system info">
  <span class="cursor-blink restore-cursor">_</span>
</button>
<button class="panel-restore-btn" id="restore-right" title="Show kill feed">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
</button>

<!-- Settings gear (bottom-left) -->
<button id="settings-btn" title="Settings">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>

<!-- Settings slide-up panel -->
<div id="settings-panel">
  <div class="settings-row">
    <span>Zoom</span>
    <div style="display: flex; gap: 4px; align-items: center;">
      <button class="ctrl" id="zoom-out" title="Zoom out">&minus;</button>
      <span id="zoom-val" style="font-size: 11px; min-width: 40px; text-align: center;">1.00x</span>
      <button class="ctrl" id="zoom-in" title="Zoom in">+</button>
    </div>
  </div>
  <div class="settings-row">
    <span>View</span>
    <button class="ctrl" id="reset-view" title="Reset view" style="width: auto; padding: 0 10px;">Reset</button>
  </div>
  <div class="settings-row">
    <span>Labels</span>
    <button class="ctrl off" id="toggle-labels" title="Toggle system name labels" style="width: auto; padding: 0 10px;">Off</button>
  </div>
  <div class="settings-row">
    <span>Colors</span>
    <div style="display: flex; gap: 4px;">
      <button class="ctrl on" id="palette-ghost"   style="width: auto; padding: 0 10px;">Default</button>
      <button class="ctrl"    id="palette-ember"   style="width: auto; padding: 0 10px;">Ember</button>
      <button class="ctrl"    id="palette-anoikis" style="width: auto; padding: 0 10px;">anoik.is</button>
      <button class="ctrl"    id="palette-whtype"  style="width: auto; padding: 0 10px;">whtype</button>
    </div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-class"></div>
</div>

<script src="./data/anoikis-systems.js"></script>
<script src="./data/type-kinds.js"></script>
<script src="./src/main.js"></script>
</body>
</html>
