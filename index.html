<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>map.anoikis.info</title>
<link rel="stylesheet" href="./styles/main.css" />
</head>
<body>

<canvas id="map"></canvas>

<!-- Screen corner decorations -->
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<!-- LEFT PANEL: search + system info -->
<div id="panel-left" class="panel">
  <div class="brand">
    <div class="brand-title">map.anoikis.info<span class="cursor-blink">_</span></div>
    <div class="brand-sub" id="star-count">0 wormhole systems</div>
  </div>
  <button class="panel-minimize-corner panel-minimize-corner--tl" id="hide-left" data-tip="Hide panel" aria-label="Hide panel"></button>
  <input id="search" type="text" placeholder="Search system (e.g. J123456)" autocomplete="off" spellcheck="false" />
  <div id="search-results"></div>

  <div id="system-info" class="empty">
    <div class="title">System</div>
    <div class="info-body">
      <div class="sys-name" id="si-name">—</div>
      <div class="info-row info-row--jcode">
        <span class="v" id="si-jcode" style="display:none;">—</span>
        <span class="v" id="si-class">—</span>
      </div>
      <div class="info-row"><span class="k">Region</span><span class="v" id="si-region">—</span></div>
      <div class="info-row"><span class="k">Constellation</span><span class="v" id="si-const">—</span></div>
      <div class="info-row"><span class="k">Effect</span><span class="v" id="si-effect">—</span></div>
      <div class="statics" id="si-statics"></div>
      <div class="si-actions">
        <button id="si-system-view" class="si-view-btn">&#9654; System View</button>
        <button id="si-intel"       class="si-view-btn">&#9654; Intel</button>
      </div>
    </div>
  </div>
</div>

<!-- ORRERY PANEL: solar system view -->
<div id="panel-orrery">
  <div class="orrery-header">
    <div class="orrery-header-info">
      <span class="title" style="margin:0;" id="orrery-title">—</span>
      <span id="orrery-planet-count"></span>
    </div>
    <div class="orrery-view-toggle">
      <button class="orrery-ctrl on" id="orrery-proj-orrery">Orrery</button>
      <button class="orrery-ctrl"    id="orrery-proj-map">Map</button>
    </div>
    <button class="panel-hide-btn" id="close-orrery" data-tip="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="orrery-body">
    <canvas id="orrery-canvas"></canvas>
    <div id="orrery-list"></div>
  </div>
  <div class="orrery-footer" id="orrery-footer">
    <div id="orrery-tip"></div>
    <button id="orrery-rotate-btn" class="orrery-ctrl">Rotation: Off</button>
  </div>
</div>

<!-- INTEL PANEL -->
<div id="panel-intel">
  <div class="intel-header">
    <div class="intel-header-info">
      <div class="title" style="margin:0;" id="intel-title">—</div>
      <div id="intel-subtitle"></div>
    </div>
    <button class="panel-hide-btn" id="close-intel" data-tip="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div id="intel-loading">
    <div class="intel-load-text">Loading<span class="cursor-blink">_</span></div>
    <div class="intel-load-segs">
      <div class="intel-load-seg"></div><div class="intel-load-seg"></div>
      <div class="intel-load-seg"></div><div class="intel-load-seg"></div>
      <div class="intel-load-seg"></div><div class="intel-load-seg"></div>
      <div class="intel-load-seg"></div><div class="intel-load-seg"></div>
      <div class="intel-load-seg"></div><div class="intel-load-seg"></div>
      <div class="intel-load-seg"></div><div class="intel-load-seg"></div>
      <div class="intel-load-seg"></div><div class="intel-load-seg"></div>
      <div class="intel-load-seg"></div><div class="intel-load-seg"></div>
    </div>
  </div>
  <div id="intel-body">
    <div class="intel-section-label" style="margin-top:16px;">
      <span>Last 24 Hours</span>
      <span id="intel-count-24h" class="intel-section-count"></span>
    </div>
    <div id="intel-hm24"></div>
    <div id="intel-hm24-labels" class="intel-hlabels"></div>

    <div class="intel-separator"></div>

    <div class="intel-section-label">
      <span>30-Day Activity Pattern</span>
      <span id="intel-count-60d" class="intel-section-count"></span>
    </div>
    <div class="intel-hm60-wrap">
      <div id="intel-dlabels" class="intel-dlabels"></div>
      <div class="intel-hm60-right">
        <div id="intel-hm60"></div>
        <div id="intel-hm60-labels" class="intel-hlabels"></div>
      </div>
    </div>

    <div id="intel-parties-section">
      <div class="intel-lists">
        <div class="intel-list-col">
          <div class="intel-section-label">Corporations</div>
          <div id="intel-corps"></div>
        </div>
        <div class="intel-list-col">
          <div class="intel-section-label">Alliances</div>
          <div id="intel-alliances"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- RIGHT PANEL: kill feed -->
<div id="panel-right" class="panel">
  <div id="kill-header">
    <div class="title" style="margin: 0;">Live Kills<span class="live-dots"><span>.</span><span>.</span><span>.</span></span></div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <button class="panel-hide-btn" id="kill-compact-toggle" data-tip="Toggle compact view">
        <svg class="kill-compact-icon-normal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="5"/><rect x="3" y="13" width="18" height="5"/></svg>
        <svg class="kill-compact-icon-compact" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6"  x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div style="font-size: 10px; color: var(--dim);" id="kill-count">0 shown</div>
    </div>
  </div>
  <button class="panel-minimize-corner panel-minimize-corner--tr" id="hide-right" data-tip="Hide panel" aria-label="Hide panel"></button>
  <div id="kill-list"></div>
  <div id="kill-footer">
    <button class="kill-footer-hdr" id="kill-footer-toggle">
      <span>Filter</span>
      <svg class="kill-footer-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div id="kill-filters">
      <div class="kill-filters-group kill-filters-kinds" data-label="Type">
        <span class="kind-chip on" data-kind="ship"       data-tip="Ships (frigates through titans, pods)">Ships</span>
        <span class="kind-chip on" data-kind="structure"  data-tip="Upwell structures (Citadels, Engineering Complexes, Refineries, …)">Structures</span>
        <span class="kind-chip" data-kind="tower"      data-tip="POS Control Towers">Towers</span>
        <span class="kind-chip" data-kind="fighter"    data-tip="Carrier / supercarrier fighters">Fighters</span>
        <span class="kind-chip" data-kind="deployable" data-tip="Mobile Depots, MTUs, Cyno Inhibitors, …">Deployables</span>
      </div>
      <div class="kill-filters-group kill-filters-tags" data-label="Tags">
        <span class="kind-chip on" data-tag="npc" data-tip="Kills where NPCs were involved (ratting losses, Drifter response fleets, …)">NPC</span>
      </div>
    </div>
  </div>
</div>


<!-- Restore buttons (visible when panels are hidden) -->
<button class="panel-restore-btn" id="restore-left" data-tip="Show search &amp; system info">
  <span class="cursor-blink restore-cursor">_</span>
</button>
<button class="panel-restore-btn" id="restore-right" data-tip="Show kill feed">
  <span class="live-lines"><span></span><span></span><span></span></span>
</button>

<!-- Settings gear (bottom-left) -->
<button id="settings-btn" data-tip="Settings">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>

<!-- Settings slide-up panel -->
<div id="settings-panel">
  <div class="settings-row">
    <span>View</span>
    <button class="ctrl" id="reset-view" data-tip="Reset view" style="width: auto; padding: 0 10px;">Reset</button>
  </div>
  <div class="settings-row">
    <span>Labels</span>
    <button class="ctrl off" id="toggle-labels" data-tip="Toggle system name labels" style="width: auto; padding: 0 10px;">Off</button>
  </div>
  <div class="settings-row settings-row--colors">
    <span>Colors</span>
    <div class="settings-palette-grid">
      <button class="ctrl on" id="palette-ghost"  style="width: auto; padding: 0 10px;">Default</button>
      <button class="ctrl"    id="palette-ember"  style="width: auto; padding: 0 10px;">Ember</button>
      <button class="ctrl"    id="palette-whtype" style="width: auto; padding: 0 10px;">whtype</button>
      <button class="ctrl"    id="palette-eve"    style="width: auto; padding: 0 10px;">eve</button>
    </div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-class"></div>
</div>

<div id="custom-tip"></div>

<script src="./data/anoikis-systems.js"></script>
<script src="./data/type-kinds.js"></script>
<script src="./src/main.js"></script>
</body>
</html>
